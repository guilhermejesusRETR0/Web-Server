<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Publicações de {{ profile.username }}</title>
</head>
<body>
  <h1>{{ profile.full_name }} (@{{ profile.username }})</h1>
  <p>{{ profile.bio }}</p>

  <h2>Publicações</h2>
  {% if posts %}
    <ul>
      {% for post in posts %}
        <li>{{ post.content }} ({{ post.likes }} likes)</li>
      {% endfor %}
    </ul>
  {% else %}
    <p>Este utilizador ainda não publicou.</p>
  {% endif %}

  <p><a href="/feed/">Ir para o feed</a></p>
</body>
</html>
