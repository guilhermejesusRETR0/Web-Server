<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Feed</title>
</head>
<body>
  <h1>Feed de Publicações</h1>
  {% if posts %}
    {% for post in posts %}
      <article>
        <h3>{{ post.author.full_name }} (@{{ post.author.username }})</h3>
        <p>{{ post.content }}</p>
        <p>{{ post.likes }} likes | {{ post.comments.count }} comentários</p>
      </article>
      <hr>
    {% endfor %}
  {% else %}
    <p>Sem publicações no momento.</p>
  {% endif %}
  <p><a href="/">Voltar ao início</a></p>
</body>
</html>
